name: Refresh good news

on:
  schedule:
    # Every Monday at 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write   # needed to dispatch the deploy workflow after a successful refresh

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run refresh script
        env:
          NOISE_TERMS: ${{ secrets.NOISE_TERMS }}
        run: python scripts/refresh_good_news.py

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "good-news-bot"
          git config user.email "good-news-bot@users.noreply.github.com"
          if git diff --quiet -- src/data/freshGoodNews.json; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add src/data/freshGoodNews.json
          git commit -m "refresh weekly good news feed"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # The default GITHUB_TOKEN suppresses workflow chaining by design,
      # so a bot commit doesn't auto-trigger the Pages deploy. We dispatch
      # it explicitly here when there's a real change.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
